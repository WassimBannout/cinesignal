name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        # Transforms are unit-tested on synthetic data (no raw dataset needed); the
        # committed demo Parquet (OQ5) lets the app smoke tests boot headless too.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,app]"

      - name: Lint (ruff)
        run: ruff check pipeline tests app

      - name: Test (pytest)
        run: pytest
